services:
  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env.example
    environment:
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "7860:7860"
    depends_on:
      - db
      - redis
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:7860 --workers 3"

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: auto_sales_agent
      POSTGRES_USER: auto_sales_agent
      POSTGRES_PASSWORD: change-me
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
